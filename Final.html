<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLR TECH - Électricité & Eau Potable Madagascar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .gradient-body { background: linear-gradient(135deg, #001a4d 0%, #003d99 30%, #ff9900 70%, #ffb84d 100%); }
        .header-white { background: white; border-bottom: 2px solid #f0f0f0; }
        .transition-all { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        .btn-primary { background: linear-gradient(135deg, #ff9900, #ffb84d); color: white; }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 10px 25px rgba(255,153,0,0.4); }
        .banner-fade { animation: fadeInOut 5s infinite; }
        @keyframes fadeInOut { 0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app"></div>

    <script>
        let state = {
            language: 'fr',
            currency: 'EUR',
            currentPage: 'home',
            cart: [],
            selectedCategory: 'all',
            bannerIndex: 0
        };

        const ARIARYRATE = 4500;

        const translations = {
            fr: {
                nav: { home: 'Accueil', products: 'Produits', blog: 'Blog', faq: 'FAQ', contact: 'Contact', about: 'À propos' },
                categories: { electricity: 'Électricité', water: 'Eau Potable' },
                cart: { title: 'Panier', checkout: 'Passer la commande', total: 'Total' },
                blog: { title: 'Découvrez les Enjeux de Madagascar' },
                footer: { slogan: 'Fait par nous, Créé pour vous', rights: '© 2026 MLR TECH. Tous droits réservés' },
            },
            mg: {
                nav: { home: 'Fampitahana', products: 'Vokatra', blog: 'Blog', faq: 'Fanontaniana', contact: 'Fifandraisana', about: 'Momba' },
                categories: { electricity: 'Herinaratra', water: 'Rano Madio' },
                cart: { title: 'Karitra', checkout: 'Manaova Baiko', total: 'Totalité' },
                blog: { title: 'Ny Lahatsoratra' },
                footer: { slogan: 'Vita avy amin\'ny amin\'ny, Niforona ho an\'ny inao', rights: '© 2026 MLR TECH' },
            }
        };

        const bannerSlides = [
            { 
                title_fr: 'Électricité pour Tous',
                title_mg: 'Herinaratra ho an\'ny Lahat',
                desc_fr: 'Découvrez nos solutions d\'énergie solaire',
                desc_mg: 'Tuklahin ang aming solusyon sa enerhiya',
                image: 'https://images.unsplash.com/photo-1509391366360-2e938960db18?w=1200&h=400&fit=crop',
                action: 'electricity'
            },
            { 
                title_fr: 'Eau Potable Accessible',
                title_mg: 'Rano Madio Abot-Kaya',
                desc_fr: 'Systèmes de filtration abordables',
                desc_mg: 'Abot-kayang sistema ng pagsala',
                image: 'https://images.unsplash.com/photo-1508037487667-a8c51f24caa6?w=1200&h=400&fit=crop',
                action: 'water'
            }
        ];

        const products = [
            { id: 1, name: 'Kit Solaire 100W', category: 'electricity', price: 150, desc: 'Éclairage simple + charge' },
            { id: 2, name: 'Kit Solaire 300W', category: 'electricity', price: 350, desc: 'Petit usage résidentiel' },
            { id: 3, name: 'Kit Solaire 1000W', category: 'electricity', price: 800, desc: 'Usage moyen' },
            { id: 4, name: 'Kit Solaire 3000W', category: 'electricity', price: 2000, desc: 'Résidence standard' },
            { id: 5, name: 'Kit Solaire 5000W', category: 'electricity', price: 3500, desc: 'Usage intensif premium' },
            { id: 6, name: 'Filtre Gravité Simple', category: 'water', price: 50, desc: 'Filtration basique' },
            { id: 7, name: 'Filtre Charbon Portable', category: 'water', price: 150, desc: 'Gourde filtrante' },
            { id: 8, name: 'Filtre Céramique', category: 'water', price: 400, desc: 'Carafe filtrante' },
            { id: 9, name: 'Système Osmose Inverse', category: 'water', price: 1200, desc: 'Réservoir premium' },
            { id: 10, name: 'Station Multi-Étapes', category: 'water', price: 2500, desc: 'Système professionnel' },
        ];

        const blogArticles = [
            { 
                title_fr: 'La Crise Énergétique à Madagascar',
                title_mg: 'Ny Krizy Angetry',
                content_fr: 'Madagascar fait face à une crise d\'électricité critique. Plus de 75% de la population n\'a pas accès à l\'électricité fiable. Les zones rurales sont particulièrement affectées avec des coupures quotidiennes.',
                content_mg: 'Madagasikara miatrika ny krizy angetry. Mahigit 75% ny zanaky ny tany tsy manana access amin\'ny herinaratra tsara.',
                image: 'https://images.unsplash.com/photo-1581092921550-e323be2ae537?w=600&h=400&fit=crop'
            },
            { 
                title_fr: 'Problèmes d\'Eau Potable à Madagascar',
                title_mg: 'Ny Olana Amin\'ny Rano Madio',
                content_fr: 'L\'accès à l\'eau potable est un défi majeur. Seuls 50% des Malgaches ont accès à de l\'eau propre. Les maladies liées à l\'eau contaminée tuent des milliers de personnes chaque année.',
                content_mg: 'Ny access amin\'ny rano madio ay isang malaking hamon. 50% lamang ng mga Malgasy ang may access.',
                image: 'https://images.unsplash.com/photo-1508037487667-a8c51f24caa6?w=600&h=400&fit=crop'
            },
            { 
                title_fr: 'L\'Énergie Solaire : Solution pour Madagascar',
                title_mg: 'Ang Enerhiya ng Araw : Solusyon',
                content_fr: 'Madagascar bénéficie de 320 jours de soleil par an. L\'énergie solaire est la solution idéale, écologique et durable. Les panneaux solaires permettent aux familles d\'accéder à l\'électricité.',
                content_mg: 'Ang Madagascar ay may 320 araw ng araw sa isang taon. Ang enerhiya ng araw ay perpektong solusyon.',
                image: 'https://images.unsplash.com/photo-1509391366360-2e938960db18?w=600&h=400&fit=crop'
            },
            { 
                title_fr: 'Notre Mission : MLR TECH',
                title_mg: 'Ang Aming Misyon : MLR TECH',
                content_fr: 'MLR TECH s\'engage à résoudre les problèmes d\'électricité et d\'eau potable. Nous proposons des solutions simples, abordables et écologiques. "Fait par nous, Créé pour vous"',
                content_mg: 'Ang MLR TECH ay nakatuon sa paglutas ng mga problema. "Ginawa ng amin, Nilikha para sa inyo"',
                image: 'https://raw.githubusercontent.com/kazaroza610-lang/MLR-TECH/main/logo_mlr.png'
            }
        ];

        function formatPrice(price) {
            if (state.currency === 'EUR') return `${price}€`;
            return `${Math.round(price * ARIARYRATE)} Ar`;
        }

        function addToCart(product) {
            state.cart.push({ ...product, cartId: Date.now() });
            render();
        }

        function removeFromCart(cartId) {
            state.cart = state.cart.filter(item => item.cartId !== cartId);
            render();
        }

        function setPage(page) {
            state.currentPage = page;
            state.selectedCategory = 'all';
            render();
        }

        function setCategory(cat) {
            state.selectedCategory = cat;
            render();
        }

        function nextBanner() {
            state.bannerIndex = (state.bannerIndex + 1) % bannerSlides.length;
            render();
        }

        function render() {
            const t = translations[state.language];
            let content = '';
            const currentSlide = bannerSlides[state.bannerIndex];

            if (state.currentPage === 'home') {
                content = `
                    <!-- BANNIÈRE DÉFILANTE -->
                    <section class="relative h-96 overflow-hidden">
                        <img src="${currentSlide.image}" alt="Banner" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black bg-opacity-40"></div>
                        <div class="absolute inset-0 flex flex-col justify-center items-center text-white text-center">
                            <h2 class="text-5xl font-bold mb-4">${state.language === 'fr' ? currentSlide.title_fr : currentSlide.title_mg}</h2>
                            <p class="text-xl mb-8">${state.language === 'fr' ? currentSlide.desc_fr : currentSlide.desc_mg}</p>
                            <div class="flex gap-4">
                                <button onclick="setCategory('electricity'); setPage('products')" class="btn-primary px-8 py-3 rounded-lg font-semibold">
                                    Électricité
                                </button>
                                <button onclick="setCategory('water'); setPage('products')" class="btn-primary px-8 py-3 rounded-lg font-semibold">
                                    Eau Potable
                                </button>
                            </div>
                        </div>
                    </section>

                    <!-- ARTICLES BLOG -->
                    <section class="gradient-body text-white px-4 py-20">
                        <div class="max-w-7xl mx-auto">
                            <h2 class="text-5xl font-bold text-center mb-4">${t.blog.title}</h2>
                            <p class="text-center text-orange-100 mb-16 text-lg">Comprenez les enjeux et nos solutions</p>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                ${blogArticles.map(a => `
                                    <div class="bg-white bg-opacity-10 backdrop-blur-sm rounded-2xl shadow-2xl hover:shadow-3xl transition-all p-8 card-hover border border-white border-opacity-20">
                                        <h3 class="text-2xl font-bold mb-4 text-white">${state.language === 'fr' ? a.title_fr : a.title_mg}</h3>
                                        <p class="text-orange-100 leading-relaxed mb-6">${state.language === 'fr' ? a.content_fr : a.content_mg}</p>
                                        <img src="${a.image}" alt="${state.language === 'fr' ? a.title_fr : a.title_mg}" class="w-full h-48 object-cover rounded-xl">
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </section>

                    <!-- PRODUITS POPULAIRES -->
                    <section class="gradient-body text-white px-4 py-20">
                        <div class="max-w-7xl mx-auto">
                            <h2 class="text-5xl font-bold text-center mb-16 text-white">Produits Populaires</h2>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                ${products.slice(0, 6).map(p => productCard(p, t)).join('')}
                            </div>
                        </div>
                    </section>
                `;
            } else if (state.currentPage === 'products') {
                const filtered = state.selectedCategory === 'all' ? products : products.filter(p => p.category === state.selectedCategory);
                
                content = `
                    <section class="gradient-body text-white px-4 py-16">
                        <div class="max-w-7xl mx-auto">
                            <h1 class="text-5xl font-bold mb-12 text-white">Notre Catalogue</h1>
                            
                            <div class="flex gap-4 mb-12 flex-wrap">
                                <button onclick="setCategory('all')" class="${state.selectedCategory === 'all' ? 'btn-primary' : 'border-2 border-white text-white'} px-6 py-3 rounded-lg font-semibold transition-all">
                                    Tous les produits
                                </button>
                                <button onclick="setCategory('electricity')" class="${state.selectedCategory === 'electricity' ? 'btn-primary' : 'border-2 border-white text-white'} px-6 py-3 rounded-lg font-semibold transition-all">
                                    Électricité
                                </button>
                                <button onclick="setCategory('water')" class="${state.selectedCategory === 'water' ? 'btn-primary' : 'border-2 border-white text-white'} px-6 py-3 rounded-lg font-semibold transition-all">
                                    Eau Potable
                                </button>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                ${filtered.map(p => productCard(p, t)).join('')}
                            </div>
                        </div>
                    </section>
                `;
            } else if (state.currentPage === 'blog') {
                content = `
                    <section class="gradient-body text-white px-4 py-16">
                        <div class="max-w-7xl mx-auto">
                            <h1 class="text-5xl font-bold mb-16 text-white">${t.blog.title}</h1>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                ${blogArticles.map(a => `
                                    <div class="bg-white bg-opacity-10 backdrop-blur-sm rounded-2xl shadow-2xl p-8 card-hover border border-white border-opacity-20">
                                        <h3 class="text-2xl font-bold mb-4 text-white">${state.language === 'fr' ? a.title_fr : a.title_mg}</h3>
                                        <p class="text-orange-100 leading-relaxed mb-6">${state.language === 'fr' ? a.content_fr : a.content_mg}</p>
                                        <img src="${a.image}" alt="${state.language === 'fr' ? a.title_fr : a.title_mg}" class="w-full h-48 object-cover rounded-xl">
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </section>
                `;
            } else if (state.currentPage === 'faq') {
                content = `
                    <section class="gradient-body text-white px-4 py-16">
                        <div class="max-w-4xl mx-auto">
                            <h1 class="text-5xl font-bold mb-12 text-white">Questions Fréquentes</h1>
                            <div class="space-y-6">
                                <div class="bg-white bg-opacity-10 backdrop-blur-sm border-l-4 border-orange-400 p-8 rounded-lg">
                                    <h3 class="font-bold text-xl mb-3 text-white">Comment fonctionne la livraison ?</h3>
                                    <p class="text-orange-100">Nous proposons deux options : Express (5-7 jours) ou Standard (3-4 semaines).</p>
                                </div>
                                <div class="bg-white bg-opacity-10 backdrop-blur-sm border-l-4 border-orange-400 p-8 rounded-lg">
                                    <h3 class="font-bold text-xl mb-3 text-white">Quels sont les moyens de paiement ?</h3>
                                    <p class="text-orange-100">Orange Money, Airtel Money, Carte Visa ou virement bancaire.</p>
                                </div>
                            </div>
                        </div>
                    </section>
                `;
            } else if (state.currentPage === 'contact') {
                content = `
                    <section class="gradient-body text-white px-4 py-16">
                        <div class="max-w-4xl mx-auto">
                            <h1 class="text-5xl font-bold mb-12 text-white">Nous Contacter</h1>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div class="space-y-8">
                                    <div><p class="font-semibold text-white mb-2 text-lg">Email</p><p class="text-orange-100">contact@mlrtech.mg</p></div>
                                    <div><p class="font-semibold text-white mb-2 text-lg">Téléphone</p><p class="text-orange-100">+261 XX XXX XXXX</p></div>
                                    <div><p class="font-semibold text-white mb-2 text-lg">Adresse</p><p class="text-orange-100">Antananarivo, Madagascar</p></div>
                                </div>
                                <form class="space-y-4">
                                    <input type="text" placeholder="Votre nom" class="w-full border border-orange-300 rounded-lg px-4 py-3 bg-white bg-opacity-10 text-white placeholder-orange-200">
                                    <input type="email" placeholder="Votre email" class="w-full border border-orange-300 rounded-lg px-4 py-3 bg-white bg-opacity-10 text-white placeholder-orange-200">
                                    <textarea placeholder="Message" rows="5" class="w-full border border-orange-300 rounded-lg px-4 py-3 bg-white bg-opacity-10 text-white placeholder-orange-200"></textarea>
                                    <button class="btn-primary w-full py-3 rounded-lg font-semibold">Envoyer</button>
                                </form>
                            </div>
                        </div>
                    </section>
                `;
            } else if (state.currentPage === 'about') {
                content = `
                    <section class="gradient-body text-white px-4 py-16">
                        <div class="max-w-4xl mx-auto">
                            <h1 class="text-5xl font-bold mb-12 text-white">À Propos de MLR TECH</h1>
                            <div class="space-y-8 text-orange-100 leading-relaxed">
                                <p class="text-lg">MLR TECH est dédiée à résoudre les crises d'électricité et d'eau potable à Madagascar avec des solutions écologiques et durables.</p>
                                <p class="text-lg">Nous proposons des kits solaires simples et des systèmes de filtration abordables, conçus pour les besoins des Malgaches.</p>
                                <div class="bg-white bg-opacity-10 backdrop-blur-sm p-8 rounded-xl border border-white border-opacity-20 mt-8">
                                    <p class="text-center font-bold text-2xl text-white">"${t.footer.slogan}"</p>
                                </div>
                            </div>
                        </div>
                    </section>
                `;
            }

            document.getElementById('app').innerHTML = `
                <!-- HEADER BLANC -->
                <nav class="header-white sticky top-0 z-50 shadow-lg">
                    <div class="max-w-7xl mx-auto px-4 py-4">
                        <div class="flex justify-center mb-4">
                            <img src="https://raw.githubusercontent.com/kazaroza610-lang/MLR-TECH/main/logo_mlr.png" alt="MLR TECH" style="height: 70px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));">
                        </div>
                        
                        <div class="flex justify-center gap-8 flex-wrap mb-4">
                            ${Object.entries(t.nav).map(([key, label]) => 
                                `<button onclick="setPage('${key}')" class="text-gray-800 hover:text-orange-500 transition font-medium text-sm md:text-base">${label}</button>`
                            ).join('')}
                        </div>

                        <div class="flex justify-center gap-3">
                            <select onchange="state.language = this.value; render()" class="bg-gray-100 text-gray-800 px-3 py-1 rounded-lg text-sm border border-gray-300">
                                <option value="fr">FR</option>
                                <option value="mg">MG</option>
                            </select>
                            <select onchange="state.currency = this.value; render()" class="bg-gray-100 text-gray-800 px-3 py-1 rounded-lg text-sm border border-gray-300">
                                <option value="EUR">EUR</option>
                                <option value="MGA">MGA</option>
                            </select>
                            <button onclick="state.menuOpen = !state.menuOpen; render()" class="relative text-gray-800 text-xl hover:text-orange-500">
                                PANIER <span class="absolute -top-2 -right-2 bg-orange-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold">${state.cart.length}</span>
                            </button>
                        </div>
                    </div>
                </nav>

                <main class="min-h-screen gradient-body">
                    ${content}
                </main>

                <footer class="bg-gray-900 text-white py-12">
                    <div class="max-w-7xl mx-auto px-4 text-center">
                        <p class="text-orange-400 font-semibold mb-2 text-lg">"${t.footer.slogan}"</p>
                        <p class="text-gray-400">${t.footer.rights}</p>
                    </div>
                </footer>

                ${state.cart.length > 0 ? `
                    <div class="fixed bottom-8 right-8 bg-white rounded-2xl shadow-2xl p-6 w-96 max-h-96 overflow-y-auto border-2 border-orange-500">
                        <h3 class="font-bold text-orange-600 mb-4 text-lg">${t.cart.title}</h3>
                        <div class="mb-4">
                            ${state.cart.map(item => `
                                <div class="flex justify-between items-center mb-3 pb-2 border-b text-sm">
                                    <span class="text-gray-800">${item.name}</span>
                                    <button onclick="removeFromCart(${item.cartId})" class="text-red-500 font-bold">X</button>
                                </div>
                            `).join('')}
                        </div>
                        <div class="font-bold text-lg mb-4 text-orange-600">Total: ${formatPrice(state.cart.reduce((s, i) => s + i.price, 0))}</div>
                        <button class="btn-primary w-full py-3 rounded-lg font-semibold">
                            ${t.cart.checkout}
                        </button>
                    </div>
                ` : ''}
            `;

            // Banner auto-change every 5 seconds
            setTimeout(() => {
                nextBanner();
            }, 5000);
        }

        function productCard(p, t) {
            const catName = p.category === 'electricity' ? t.categories.electricity : t.categories.water;
            
            return `
                <div class="bg-white bg-opacity-10 backdrop-blur-sm rounded-2xl shadow-lg card-hover overflow-hidden border border-white border-opacity-20">
                    <div class="bg-gradient-to-br from-white from-opacity-20 to-orange-400 to-opacity-20 h-48 flex items-center justify-center text-4xl font-bold text-white">
                        ${catName}
                    </div>
                    <div class="p-6">
                        <span class="inline-block bg-orange-500 bg-opacity-30 text-orange-200 px-3 py-1 rounded-full text-sm font-semibold mb-2">${catName}</span>
                        <h3 class="font-bold text-lg mb-2 text-white">${p.name}</h3>
                        <p class="text-orange-100 text-sm mb-4">${p.desc}</p>
                        <div class="mb-6">
                            <span class="text-3xl font-bold text-orange-300">${formatPrice(p.price)}</span>
                        </div>
                        <button onclick="addToCart(${JSON.stringify(p).replace(/"/g, '&quot;')})" class="btn-primary w-full py-3 rounded-lg font-semibold">
                            Ajouter au panier
                        </button>
                    </div>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
